name: Atualizar SELIC e VAU

on:
  schedule:
    # 08:00 UTC = 05:00 em Brasília.
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-indices:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar leitor de PDF
        run: python -m pip install pypdf

      - name: Atualizar dados
        run: python scripts/update-data.py

      - name: Publicar alterações
        run: |
          if git diff --quiet -- result.js reducao.js; then
            echo "Nenhuma alteração de índices encontrada."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add result.js reducao.js
          git commit -m "Atualiza índices automáticos"
          git push
