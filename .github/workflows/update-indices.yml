name: Atualizar SELIC e VAU

on:
  schedule:
    # Tentativas diárias em horário de Brasília/Araguaína: 08h, 11h, 14h, 17h e 19h.
    # O cron do GitHub Actions usa UTC.
    - cron: "0 11,14,17,20,22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-indices:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar leitor de PDF
        run: python -m pip install pypdf

      - name: Atualizar dados
        run: python scripts/update-data.py

      - name: Publicar alterações
        run: |
          if git diff --quiet -- result.js reducao.js reducao.html; then
            echo "Nenhuma alteração de índices encontrada."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add result.js reducao.js reducao.html
          git commit -m "Atualiza índices automáticos"
          git push
