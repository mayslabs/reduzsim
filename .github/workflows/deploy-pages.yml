name: Publicar GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Preparar arquivos estaticos
        shell: bash
        run: |
          mkdir _site
          cp index.html main.css main.js _site/
          cp result.html result.js _site/
          cp reducao.html reducao.js _site/
          cp final.html final.js _site/
          cp -R assets _site/assets
          touch _site/.nojekyll

      - name: Enviar artefato do Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
